[build]
builder = "NIXPACKS"
buildCommand = "chmod +x gradlew && ./gradlew bootJar -x test"

[deploy]
startCommand = "java -jar build/libs/App_Llamadas_Backend-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
