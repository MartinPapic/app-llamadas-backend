spring:
  application:
    name: appllamadas-backend
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:app_llamadas}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:REMOVED_SECRET}
  expiration-ms: 28800000   # 8 horas
  refresh-expiration-ms: 604800000  # 7 días
